name: CI

# pull_request (no branch filter) gates EVERY PR regardless of base branch; push is scoped
# to main so direct commits to main are gated without double-running the job on PR branches
# (which would fire both push and pull_request for the same commit).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      # Mandatory architecture gate: ark-check exits non-zero on any layer
      # violation, which fails the job and blocks the merge.
      - name: Architecture gate (ark-check)
        run: npm run check:architecture
